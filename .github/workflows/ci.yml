name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8

      - name: Lint with flake8
        run: flake8 src api tests --max-line-length=120 --ignore=E501,W503,E402,E401

      - name: Run unit tests
        run: pytest tests/ -v

      # Data ships in the repo (data/heart.csv), so no download is needed in CI.
      # Training now fails the pipeline on real errors, satisfying the
      # "pipeline must fail on code or test errors" requirement.
      - name: Train model (main branch only)
        if: github.ref == 'refs/heads/main'
        run: python src/train.py

      - name: Build Docker image
        run: docker build -t heart-disease-api:${{ github.sha }} .