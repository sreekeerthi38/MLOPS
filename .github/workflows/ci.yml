name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8

      - name: Lint with flake8
        run: flake8 src api tests --max-line-length=120 --ignore=E501,W503,E402,E401

      - name: Run unit tests
        run: pytest tests/ -v

      # Model training is optional / heavy — only run on main
      - name: Train model (main branch only)
        if: github.ref == 'refs/heads/main'
        run: |
          python data/download_data.py || echo "Skipping live download in CI"
          python src/train.py || echo "Training skipped — no data available"

      - name: Build Docker image
        run: docker build -t heart-disease-api:${{ github.sha }} .
